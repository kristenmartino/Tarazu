name: Migrate DB

# Applies Supabase migrations to production automatically whenever a migration
# file is merged to main. No more manual `db push`.
#
# One-time setup — add two GitHub Actions secrets (Settings → Secrets and
# variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — a personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — the project's database password
#                            (Project Settings → Database → Connection / reset)
# Until both are set, the job logs a notice and exits green (no-op).
# The project ref below is not a secret (it appears in the project URL).

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: lyrnkwqxxsjqjcjggies
    steps:
      - name: Check for credentials
        id: guard
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::notice::Supabase secrets not set — skipping. Add SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD to enable auto-migrate."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.ready == 'true'

      - uses: supabase/setup-cli@v1
        if: steps.guard.outputs.ready == 'true'
        with:
          version: latest

      - name: Link project
        if: steps.guard.outputs.ready == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply migrations
        if: steps.guard.outputs.ready == 'true'
        run: supabase db push
